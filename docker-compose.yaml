services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-myproject}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-myproject}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  fastapi:
    build: .
    expose:
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override URLs to point at the local compose services
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/myproject
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      S3_BUCKET: ${S3_BUCKET}
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
