events {
    worker_connections 1024;
}

http {
    client_max_body_size 500M;  # максимальный размер загружаемого файла

    # HTTP → HTTPS редирект
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Передаём реальный IP в FastAPI (нужен для rate limiter)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Проксирование медиафайлов из S3 — решает CORS полностью
        location /media/ {
            proxy_pass https://storage.yandexcloud.net/BUCKET_NAME_PLACEHOLDER/;
            proxy_ssl_server_name on;
            proxy_set_header Host storage.yandexcloud.net;
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto "";
            proxy_set_header Authorization "";
            proxy_hide_header x-amz-request-id;
            proxy_hide_header x-amz-id-2;
            add_header Cache-Control "public, max-age=604800";
        }

        # Загрузка файлов — увеличенный таймаут для больших видео
        location ~* ^/chats/[^/]+/upload$ {
            proxy_pass http://fastapi:8000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Обычные HTTP запросы
        location / {
            proxy_pass http://fastapi:8000;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket
        location /chats/ws/ {
            proxy_pass http://fastapi:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
